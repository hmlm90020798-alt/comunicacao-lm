<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2C5E1A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Comunicação LM">
<link rel="manifest" href="manifest.json">
<title>Comunicação LM</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1c1917;--ink-2:#44403c;--ink-3:#78716c;--ink-4:#a8a29e;
  --paper:#fafaf9;--paper-2:#f5f5f4;--paper-3:#e7e5e4;--paper-4:#d6d3d1;
  --green:#2C5E1A;--green-mid:#4A8C2A;--green-pale:#f0f7eb;--green-brd:#c6e0b4;
  --blue:#1e40af;--blue-pale:#eff6ff;--blue-brd:#bfdbfe;
  --amber:#92400e;--amber-pale:#fffbeb;
  --red:#b91c1c;--red-pale:#fef2f2;
  --serif:'Fraunces',Georgia,serif;--sans:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:10px;--sh:0 1px 3px rgba(0,0,0,.07)
}
body{font-family:var(--sans);background:var(--paper-2);color:var(--ink);min-height:100vh;font-size:15px}
.hdr{background:var(--paper);border-bottom:1px solid var(--paper-3);height:54px;display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.hdr-brand{font-family:var(--serif);font-size:19px;font-weight:600}
.hdr-brand em{font-style:italic;font-weight:300;color:var(--green)}
.hdr-tag{font-family:var(--mono);font-size:10px;color:var(--ink-4);letter-spacing:1.5px;text-transform:uppercase}
.hdr-right{margin-left:auto;display:flex;gap:8px}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 54px)}
.nav{background:var(--paper);border-right:1px solid var(--paper-3);padding:20px 0;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto}
.nav-lbl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-4);padding:0 16px;margin-bottom:6px;display:block}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-left:3px solid transparent;font-size:13px;color:var(--ink-2);transition:all .15s;user-select:none}
.nav-item:hover{background:var(--paper-2);color:var(--ink)}
.nav-item.ativo{background:var(--green-pale);border-left-color:var(--green);color:var(--green);font-weight:500}
.nav-item-ico{font-size:15px;width:20px;text-align:center}
.content{padding:28px 32px;overflow-y:auto}
.page-eyebrow{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-4);margin-bottom:6px}
.page-title{font-family:var(--serif);font-size:28px;font-weight:300;margin-bottom:4px}
.page-title em{font-style:italic;color:var(--green)}
.page-sub{font-size:13px;color:var(--ink-3);margin-bottom:24px}
.sec-lbl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1.8px;color:var(--ink-4);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--paper-3)}
.campo{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.campo-label{font-size:12px;font-weight:500;color:var(--ink-2)}
.inp,.textarea{width:100%;background:var(--paper);border:1px solid var(--paper-3);border-radius:8px;padding:9px 12px;color:var(--ink);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s}
.inp:focus,.textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(44,94,26,.07)}
.inp::placeholder,.textarea::placeholder{color:var(--ink-4)}
.textarea{resize:vertical;min-height:80px;line-height:1.6}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cstr{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 54px)}
.cstr-esq{padding:24px 28px;border-right:1px solid var(--paper-3);overflow-y:auto}
.cstr-dir{padding:24px 28px;background:var(--paper);position:sticky;top:54px;height:calc(100vh - 54px);display:flex;flex-direction:column;gap:12px;overflow-y:auto}
.prev-lbl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1.8px;color:var(--ink-4);padding-bottom:5px;border-bottom:1px solid var(--paper-3)}
.prev-box{flex:1;background:var(--paper-2);border:1px solid var(--paper-3);border-radius:var(--r);padding:16px;font-size:13px;color:var(--ink-2);line-height:1.9;white-space:pre-wrap;overflow-y:auto;min-height:160px}
.ph{color:var(--ink-4);font-style:italic}
.blocos{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.bloco{border:1.5px solid var(--paper-3);border-radius:var(--r);overflow:hidden;background:var(--paper);box-shadow:var(--sh);transition:border-color .15s}
.bloco.sv{border-color:var(--green)}.bloco.sa{border-color:var(--blue)}
.bloco-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;transition:background .15s}
.bloco-hdr:hover{background:var(--paper-2)}
.bnum{width:22px;height:22px;border-radius:50%;background:var(--paper-3);color:var(--ink-3);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.bloco.sv .bnum{background:var(--green);color:#fff}.bloco.sa .bnum{background:var(--blue);color:#fff}
.btit{font-size:13px;font-weight:500;color:var(--ink-2);flex:1}
.bloco.sv .btit,.bloco.sa .btit{color:var(--ink)}
.bsel{font-size:11px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bloco.sv .bsel{color:var(--green)}.bloco.sa .bsel{color:var(--blue)}
.chev{font-size:11px;color:var(--ink-4);transition:transform .2s;flex-shrink:0}
.bloco.aberto .chev{transform:rotate(180deg)}
.opcoes{display:none;border-top:1px solid var(--paper-3);padding:8px}
.bloco.aberto .opcoes{display:block}
.opc{padding:9px 12px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--ink-2);line-height:1.5;margin-bottom:3px;border:1.5px solid transparent;transition:all .12s}
.opc:hover{background:var(--paper-2);border-color:var(--paper-3)}
.opc.av{background:var(--green-pale);border-color:var(--green-brd);color:var(--green)}
.opc.aa{background:var(--blue-pale);border-color:var(--blue-brd);color:var(--blue)}
.opc-sem{font-style:italic;color:var(--ink-4)}
.opc-livre{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:7px;border:1.5px dashed var(--paper-3);margin-bottom:3px;cursor:text;transition:border-color .12s}
.opc-livre:focus-within{border-color:var(--green)}
.opc-livre-inp{flex:1;border:none;background:transparent;font-family:var(--sans);font-size:13px;color:var(--ink-2);outline:none}
.opc-livre-inp::placeholder{color:var(--ink-4);font-style:italic}
.btn-bib{display:flex;align-items:center;gap:5px;padding:7px 10px;border-radius:7px;border:1px dashed var(--paper-4);background:none;font-family:var(--sans);font-size:12px;color:var(--ink-3);cursor:pointer;transition:all .15s;margin:4px 0 0;width:100%}
.btn-bib:hover{border-color:var(--green-brd);color:var(--green);background:var(--green-pale)}
.btn-p{padding:11px;color:#fff;border:none;border-radius:8px;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;width:100%;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-p.v{background:var(--green)}.btn-p.v:hover{background:var(--green-mid)}
.btn-p.a{background:var(--blue)}.btn-p.a:hover{background:#1e3a8a}
.btn-p.am{background:#b45309}.btn-p.am:hover{background:#92400e}
.btn-s{padding:9px;background:none;color:var(--ink-3);border:1px solid var(--paper-3);border-radius:8px;font-family:var(--sans);font-size:13px;cursor:pointer;width:100%;transition:all .15s}
.btn-s:hover{color:var(--ink);border-color:var(--paper-4)}
.btn-ic{padding:7px 10px;background:none;border:1px solid var(--paper-3);border-radius:7px;font-size:14px;cursor:pointer;transition:all .15s;color:var(--ink-3)}
.btn-ic:hover{background:var(--amber-pale);border-color:#fcd34d;color:var(--amber)}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:32px}
.hcard{background:var(--paper);border:1px solid var(--paper-3);border-radius:var(--r);padding:20px;cursor:pointer;transition:all .2s;box-shadow:var(--sh)}
.hcard:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.09)}
.hcard-ico{font-size:28px;margin-bottom:12px}
.hcard-titulo{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:4px}
.hcard-desc{font-size:13px;color:var(--ink-3);line-height:1.5}
.hcard-arr{font-size:12px;color:var(--ink-4);margin-top:10px}
.hcard:hover .hcard-arr{color:var(--green)}
.refs-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.ref-card{background:var(--paper);border:1px solid var(--paper-3);border-radius:8px;padding:10px 12px;transition:border-color .15s}
.ref-card.tem{border-color:var(--green-brd);background:var(--green-pale)}
.ref-badge{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:1px;color:var(--ink-4);text-transform:uppercase;margin-bottom:3px}
.ref-card.tem .ref-badge{color:var(--green)}
.ref-desc{font-size:11px;color:var(--ink-4);margin-bottom:6px;line-height:1.4}
.ref-inp{width:100%;border:none;border-bottom:1px solid var(--paper-3);background:transparent;padding:4px 0;color:var(--ink);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s}
.ref-inp:focus{border-bottom-color:var(--green)}
.ref-inp::placeholder{color:var(--ink-4)}
.dest-wrap{background:var(--paper);border:1.5px solid var(--paper-3);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);margin-bottom:20px}
.dest-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--paper-2);border-bottom:1px solid var(--paper-3)}
.dest-hdr-t{font-size:13px;font-weight:500;color:var(--ink)}
.btn-gerir{font-size:12px;color:var(--green);background:none;border:none;cursor:pointer;font-family:var(--sans)}
.btn-gerir:hover{text-decoration:underline}
.dest-body{padding:10px}
.dest-lista{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.dest-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--paper-2);border:1px solid var(--paper-3);border-radius:7px;transition:all .15s}
.dest-item.sp{border-color:var(--green);background:var(--green-pale)}
.dest-item.sc{border-color:#d97706;background:#fffbeb}
.dest-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--paper-4);display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;flex-shrink:0}
.dest-item.sp .dest-check{background:var(--green);border-color:var(--green);color:#fff}
.dest-item.sc .dest-check{background:#d97706;border-color:#d97706;color:#fff}
.dest-info{flex:1}
.dest-nome{font-size:13px;font-weight:500;color:var(--ink-2)}
.dest-email{font-size:11px;color:var(--ink-4)}
.dest-btns{display:flex;gap:4px}
.dest-btn{font-size:11px;font-weight:500;padding:3px 8px;border-radius:5px;border:1px solid var(--paper-3);background:var(--paper);color:var(--ink-3);cursor:pointer;transition:all .12s}
.dest-btn:hover{border-color:var(--green-brd);color:var(--green)}
.dest-btn.ap{background:var(--green);color:#fff;border-color:var(--green)}
.dest-btn.ac{background:#d97706;color:#fff;border-color:#d97706}
.dest-acoes{display:flex;gap:6px}
.btn-cd{flex:1;padding:7px 8px;border:1px solid var(--paper-3);border-radius:7px;background:var(--paper);font-family:var(--sans);font-size:12px;font-weight:500;color:var(--ink-2);cursor:pointer;transition:all .15s;text-align:center}
.btn-cd:hover{background:var(--green-pale);border-color:var(--green-brd);color:var(--green)}
.art-linha{display:grid;grid-template-columns:1fr 140px 32px;gap:8px;margin-bottom:8px;align-items:center}
.btn-del{width:32px;height:32px;border-radius:7px;border:1px solid var(--paper-3);background:var(--paper);color:var(--ink-4);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.btn-del:hover{background:var(--red-pale);border-color:#fca5a5;color:var(--red)}
.btn-add{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:var(--green-pale);border:1.5px solid var(--green-brd);border-radius:7px;color:var(--green);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;margin-top:8px}
.btn-add:hover{background:var(--green);color:#fff;border-color:var(--green)}
.tabs-int{display:flex;border-bottom:1px solid var(--paper-3);margin-bottom:20px}
.tab-int{padding:10px 18px;font-size:13px;font-weight:500;color:var(--ink-3);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all .15s;user-select:none}
.tab-int:hover{color:var(--ink)}
.tab-int.av{color:var(--green);border-bottom-color:var(--green)}
.tab-int.aa{color:var(--blue);border-bottom-color:var(--blue)}
.canal-grid{display:flex;gap:8px;margin-bottom:16px}
.canal-btn{flex:1;padding:9px;border:1.5px solid var(--paper-3);border-radius:8px;background:var(--paper);cursor:pointer;text-align:center;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink-2);transition:all .15s}
.canal-btn.sel{border-color:var(--green);background:var(--green-pale);color:var(--green)}
.bib-bar{display:flex;gap:10px;align-items:center;margin-bottom:14px}
.bib-sw{flex:1;position:relative}
.bib-si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink-4);font-size:13px}
.bib-inp{width:100%;background:var(--paper);border:1px solid var(--paper-3);border-radius:8px;padding:8px 12px 8px 32px;font-family:var(--sans);font-size:13px;color:var(--ink);outline:none;transition:border-color .15s}
.bib-inp:focus{border-color:var(--green)}
.bib-inp::placeholder{color:var(--ink-4)}
.bib-count{font-family:var(--mono);font-size:11px;color:var(--ink-4);white-space:nowrap}
.bib-cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.bib-cat{padding:5px 12px;border-radius:20px;border:1px solid var(--paper-3);background:var(--paper);font-family:var(--sans);font-size:12px;color:var(--ink-2);cursor:pointer;transition:all .15s}
.bib-cat:hover{border-color:var(--green-brd);color:var(--green)}
.bib-cat.at{background:var(--green);color:#fff;border-color:var(--green)}
.bib-st{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink-4);margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--paper-3)}
.bib-fs{display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.bib-f{background:var(--paper);border:1px solid var(--paper-3);border-radius:8px;padding:11px 12px;display:flex;align-items:flex-start;gap:8px;box-shadow:var(--sh)}
.bib-f:hover{border-color:var(--green-brd)}
.bib-ft{flex:1;font-size:13px;color:var(--ink-2);line-height:1.6;white-space:pre-line}
.bib-fa{display:flex;gap:5px;flex-shrink:0}
.btn-cb{padding:4px 10px;border-radius:6px;border:1px solid var(--paper-3);background:var(--paper-2);font-family:var(--sans);font-size:11px;color:var(--ink-3);cursor:pointer;transition:all .15s}
.btn-cb:hover{background:var(--green);color:#fff;border-color:var(--green)}
.btn-fb{padding:4px 8px;border-radius:6px;border:1px solid var(--paper-3);background:var(--paper-2);font-size:12px;cursor:pointer;transition:all .15s}
.btn-fb.at{background:var(--amber-pale);border-color:#fcd34d}
.fav-grid{display:flex;flex-direction:column;gap:8px}
.fav-card{background:var(--paper);border:1px solid var(--paper-3);border-radius:8px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--sh)}
.fav-body{flex:1}
.fav-cat{font-family:var(--mono);font-size:10px;color:var(--ink-4);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.fav-txt{font-size:13px;color:var(--ink-2);line-height:1.6;white-space:pre-line}
.rasc-card{background:var(--paper);border:1px solid var(--paper-3);border-radius:8px;padding:14px 16px;box-shadow:var(--sh);margin-bottom:10px}
.rasc-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rasc-titulo{font-size:14px;font-weight:500;color:var(--ink)}
.rasc-data{font-family:var(--mono);font-size:11px;color:var(--ink-4)}
.rasc-txt{font-size:13px;color:var(--ink-3);white-space:pre-line;max-height:80px;overflow:hidden}
.rasc-acoes{display:flex;gap:6px;margin-top:10px}
.btn-r{padding:5px 12px;border-radius:6px;border:1px solid var(--paper-3);background:var(--paper);font-family:var(--sans);font-size:12px;color:var(--ink-2);cursor:pointer;transition:all .15s}
.btn-r.del:hover{background:var(--red-pale);border-color:#fca5a5;color:var(--red)}
.empty{text-align:center;padding:48px 20px;color:var(--ink-4)}
.empty-ico{font-size:36px;margin-bottom:12px}
.empty-t{font-size:15px;font-weight:500;color:var(--ink-3);margin-bottom:6px}
.empty-s{font-size:13px}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;align-items:center;justify-content:center;padding:20px}
.modal-ov.aberto{display:flex}
.modal-box{background:var(--paper);border-radius:14px;width:100%;max-width:580px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--paper-3)}
.modal-titulo{font-size:15px;font-weight:500;color:var(--ink)}
.modal-hint{font-size:11px;color:var(--ink-4);margin-top:2px}
.modal-close{background:none;border:none;font-size:22px;color:var(--ink-3);cursor:pointer;line-height:1}
.modal-cats{display:flex;gap:5px;flex-wrap:wrap;padding:8px 14px;border-bottom:1px solid var(--paper-3);background:var(--paper-2)}
.modal-cat-pill{padding:4px 10px;border-radius:20px;border:1px solid var(--paper-3);background:var(--paper);font-family:var(--sans);font-size:11px;color:var(--ink-2);cursor:pointer;transition:all .15s;white-space:nowrap}
.modal-cat-pill:hover{border-color:var(--green-brd);color:var(--green)}
.modal-cat-pill.at{background:var(--green);color:#fff;border-color:var(--green)}
.modal-srch{padding:10px 14px;border-bottom:1px solid var(--paper-3)}
.modal-si{width:100%;background:var(--paper-2);border:1px solid var(--paper-3);border-radius:8px;padding:8px 12px;font-family:var(--sans);font-size:13px;color:var(--ink);outline:none;transition:border-color .15s}
.modal-si:focus{border-color:var(--green)}
.modal-si::placeholder{color:var(--ink-4)}
.modal-lista{overflow-y:auto;flex:1;padding:10px 14px;display:flex;flex-direction:column;gap:5px}
.modal-frase{padding:10px 12px;background:var(--paper-2);border:1px solid var(--paper-3);border-radius:8px;font-size:13px;color:var(--ink-2);line-height:1.6;cursor:pointer;transition:all .15s;white-space:pre-line}
.modal-frase:hover{border-color:var(--green-brd);background:var(--green-pale);color:var(--green)}
.modal-ch{font-family:var(--mono);font-size:10px;color:var(--ink-4);text-transform:uppercase;letter-spacing:1px;padding:6px 0 4px;border-bottom:1px solid var(--paper-3);margin-bottom:5px}
.modal-ctc-inp{padding:8px 10px;border:1px solid var(--paper-3);border-radius:7px;font-family:var(--sans);font-size:13px;color:var(--ink);outline:none;background:var(--paper-2);transition:border-color .15s;width:100%}
.modal-ctc-inp:focus{border-color:var(--green)}
.modal-ctc-inp::placeholder{color:var(--ink-4)}
.btn-add-ctc{padding:9px 14px;background:var(--green);color:#fff;border:none;border-radius:7px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}

<script>
'use strict';

// ═══════════════════════════════════════════════════════
// UTILITÁRIOS
// ═══════════════════════════════════════════════════════

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2200);
}

function esc(s){
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');
}

// Substitui {{VAR}} no template pelos valores do dicionário
function fillD(tmpl, data){
  var r=String(tmpl);
  Object.keys(data).forEach(function(k){
    r=r.split('{{'+k+'}}').join(data[k]);
  });
  return r;
}

// Calcula o nome completo com tratamento
function nomeCompleto(nome, trat){
  if(trat==='sem' || trat==='neutro') return nome || '[nome]';
  return (trat + ' ' + (nome || '[nome]')).trim();
}

// ═══════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════

function lsGet(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } }
function lsSet(k,v){ localStorage.setItem(k,JSON.stringify(v)); }

// Favoritos
function getFavs(){ return lsGet('clm_favs'); }
function isFav(txt){ return getFavs().some(function(f){ return f.texto===txt; }); }
function toggleFav(txt,cat){
  var favs=getFavs();
  var idx=favs.findIndex(function(f){ return f.texto===txt; });
  if(idx>=0){ favs.splice(idx,1); lsSet('clm_favs',favs); return false; }
  favs.unshift({id:Date.now(),texto:txt,categoria:cat||'Geral',data:new Date().toLocaleDateString('pt-PT')});
  lsSet('clm_favs',favs); return true;
}
function removeFav(id){ lsSet('clm_favs',getFavs().filter(function(f){ return f.id!==id; })); }

// Rascunhos
function getRascs(){ return lsGet('clm_rascs'); }
function saveRasc(titulo,texto,modulo){
  var rascs=getRascs();
  rascs.unshift({id:Date.now(),titulo:titulo||'Sem título',texto:texto,modulo:modulo,
    data:new Date().toLocaleDateString('pt-PT'),
    hora:new Date().toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'})});
  lsSet('clm_rascs',rascs.slice(0,50));
}
function removeRasc(id){ lsSet('clm_rascs',getRascs().filter(function(r){ return r.id!==id; })); }
function guardarRascunho(titulo,texto,modulo){ saveRasc(titulo,texto,modulo); toast('📝 Rascunho guardado'); }

// Contactos
function getCtcs(){ return lsGet('clm_ctcs'); }
function saveCtcs(v){ lsSet('clm_ctcs',v); }

// Memória de campos por módulo
function memSave(mod, ids, blocos){
  var data={};
  ids.forEach(function(id){
    var el=document.getElementById(id);
    if(el) data[id]=el.value;
  });
  // Guardar estado dos blocos (opção seleccionada + campo livre)
  if(blocos){
    data['_blocos']={};
    blocos.forEach(function(bid){
      var opts=document.getElementById('o-'+bid);
      var liv=document.getElementById('l-'+bid);
      var ativo=opts?opts.querySelector('.opc.av,.opc.aa'):null;
      data['_blocos'][bid]={
        val: ativo ? ativo.dataset.v : null,
        livre: liv ? liv.value : ''
      };
    });
  }
  localStorage.setItem('clm_mem_'+mod, JSON.stringify(data));
}
function memLoad(mod, ids, blocos){
  try{
    var data=JSON.parse(localStorage.getItem('clm_mem_'+mod)||'{}');
    ids.forEach(function(id){
      var el=document.getElementById(id);
      if(el && data[id]!==undefined) el.value=data[id];
    });
    // Restaurar estado dos blocos
    if(blocos && data['_blocos']){
      blocos.forEach(function(bid){
        var estado=data['_blocos'][bid];
        if(!estado) return;
        var opts=document.getElementById('o-'+bid);
        var liv=document.getElementById('l-'+bid);
        // Restaurar campo livre
        if(liv && estado.livre) liv.value=estado.livre;
        // Restaurar opção seleccionada pelo data-v
        if(opts && estado.val!==null && estado.val!==undefined){
          opts.querySelectorAll('.opc').forEach(function(o){
            if(o.dataset.v===estado.val){
              o.classList.add('av');
              var bloco=document.getElementById(bid);
              if(bloco) bloco.classList.add('sv');
              var s=document.getElementById('s-'+bid);
              if(s) s.textContent=o.classList.contains('opc-sem')?'(nenhum)':o.textContent.slice(0,28);
            }
          });
        }
      });
    }
  }catch(e){}
}
function memClear(mod){ localStorage.removeItem('clm_mem_'+mod); }

// ═══════════════════════════════════════════════════════
// NAVEGAÇÃO
// ═══════════════════════════════════════════════════════

function navegar(pagina){
  document.querySelectorAll('.nav-item').forEach(function(n){
    n.classList.toggle('ativo', n.dataset.p===pagina);
  });
  var c=document.getElementById('content');
  if(pagina==='home')         c.innerHTML=pgHome();
  else if(pagina==='proposta')    { c.innerHTML=pgProposta();    pInit(); }
  else if(pagina==='reporte')     { c.innerHTML=pgReporte();     rInit(); }
  else if(pagina==='processuais') { c.innerHTML=pgProcessuais(); prInit(); }
  else if(pagina==='biblioteca')  { c.innerHTML=pgBiblioteca();  bibInit(); }
  else if(pagina==='respostas')   { c.innerHTML=pgRespostas();   rrInit(); }
  else if(pagina==='favoritos')   c.innerHTML=pgFavoritos();
  else if(pagina==='rascunhos')   c.innerHTML=pgRascunhos();
  window.scrollTo(0,0);
}

// ═══════════════════════════════════════════════════════
// BLOCOS — funções partilhadas por todos os módulos
// ═══════════════════════════════════════════════════════

// Gera o HTML de um bloco com as suas opções
// NOTA: os valores das opções usam \n directamente (character real)
// O mkBloco converte \n para &#10; no data-v para armazenamento seguro em HTML
function mkBloco(id, num, titulo, cor, opcs, semTxt, livrePH){
  var opcsHtml = opcs.map(function(o){
    // Guardar o valor com \n convertido para &#10; no atributo HTML
    var dataVal = o[0].replace(/\n/g, '&#10;').replace(/"/g, '&quot;');
    return '<div class="opc" data-v="' + dataVal + '" onclick="selOpc(\'' + id + '\',\'' + cor + '\',this)">' + o[1] + '</div>';
  }).join('');

  return '<div class="bloco" id="' + id + '">' +
    '<div class="bloco-hdr" onclick="togBloco(\'' + id + '\')">' +
    '<span class="bnum">' + num + '</span>' +
    '<span class="btit">' + titulo + '</span>' +
    '<span class="bsel" id="s-' + id + '"></span>' +
    '<span class="chev">▼</span></div>' +
    '<div class="opcoes" id="o-' + id + '">' + opcsHtml +
    '<div class="opc opc-sem" data-v="" onclick="selOpc(\'' + id + '\',\'' + cor + '\',this)">' + (semTxt||'(nenhum)') + '</div>' +
    '<div class="opc-livre" onclick="this.querySelector(\'input\').focus()">' +
    '<input class="opc-livre-inp" id="l-' + id + '" placeholder="' + (livrePH||'Outro...') + '" oninput="livreOpc(\'' + id + '\',\'' + cor + '\',this)"></div>' +
    '<button class="btn-bib" onclick="modalBibAbrir(\'' + id + '\')">🔍 Pesquisar na biblioteca</button>' +
    '</div></div>';
}

function togBloco(id){
  var el=document.getElementById(id);
  if(el) el.classList.toggle('aberto');
}

function selOpc(blocoId, cor, el){
  // Limpar selecções anteriores
  var opts=document.getElementById('o-'+blocoId);
  if(opts) opts.querySelectorAll('.opc').forEach(function(o){ o.classList.remove('av','aa'); });
  // Marcar esta opção
  el.classList.add(cor==='a' ? 'aa' : 'av');
  // Actualizar bloco
  var bloco=document.getElementById(blocoId);
  if(bloco){ bloco.classList.remove('aberto','sv','sa'); bloco.classList.add(cor==='a' ? 'sa' : 'sv'); }
  // Actualizar sumário
  var s=document.getElementById('s-'+blocoId);
  if(s) s.textContent = el.classList.contains('opc-sem') ? '(nenhum)' : el.textContent.slice(0,28);
  // Pré-preencher campo livre com o valor da opção para permitir edição
  var liv=document.getElementById('l-'+blocoId);
  if(liv){
    // Converter &#10; para \n real no campo editável
    var val = (el.dataset.v || '').replace(/&#10;/g, '\n');
    liv.value = val;
    liv.placeholder = val ? 'Edita aqui se necessário...' : (blocoId.includes('bp') ? 'Outra opção...' : 'Outro...');
  }
  triggerRender();
}

function livreOpc(blocoId, cor, inp){
  // Quando edita o campo livre, limpar selecção de opção
  var opts=document.getElementById('o-'+blocoId);
  if(opts) opts.querySelectorAll('.opc').forEach(function(o){ o.classList.remove('av','aa'); });
  var bloco=document.getElementById(blocoId);
  var s=document.getElementById('s-'+blocoId);
  if(inp.value.trim()){
    if(bloco) bloco.classList.add(cor==='a' ? 'sa' : 'sv');
    if(s) s.textContent = inp.value.slice(0,28);
  } else {
    if(bloco) bloco.classList.remove('sv','sa');
    if(s) s.textContent = '';
  }
  triggerRender();
}

// Obter o valor de um bloco
// Prioridade: campo livre > opção seleccionada
// A conversão de &#10; para \n acontece AQUI e apenas aqui
function getBVal(blocoId){
  var opts=document.getElementById('o-'+blocoId);
  if(!opts) return undefined;
  var liv=document.getElementById('l-'+blocoId);
  if(liv && liv.value.trim()) return liv.value.trim();
  var ativo=opts.querySelector('.opc.av,.opc.aa');
  if(ativo){
    var val = ativo.dataset.v !== undefined ? ativo.dataset.v : null;
    if(val){
      val = val.replace(/&#10;/g, '\n');
      val = val.replace(/\\n/g, '\n');
    }
    return val;
  }
  return undefined;
}

function resetBlocos(ids){
  ids.forEach(function(id){
    var opts=document.getElementById('o-'+id);
    if(opts) opts.querySelectorAll('.opc').forEach(function(o){ o.classList.remove('av','aa'); });
    var bloco=document.getElementById(id); if(bloco) bloco.classList.remove('sv','sa','aberto');
    var s=document.getElementById('s-'+id); if(s) s.textContent='';
    var l=document.getElementById('l-'+id); if(l) l.value='';
  });
}

function triggerRender(){
  if(document.getElementById('p-prev'))  pRender();
  if(document.getElementById('r-prev'))  rRender();
  if(document.getElementById('pr-prev')) prRender();
}

  setTimeout(pRender, 0);
}

function pCanal(c){
  _pCanal=c;
  var e=document.getElementById('p-email'), w=document.getElementById('p-wapp');
  if(e) e.classList.toggle('sel', c==='email');
  if(w) w.classList.toggle('sel', c==='whatsapp');
  pRender();
}

function pRender(){
  var nome  = document.getElementById('p-nome') ? document.getElementById('p-nome').value.trim() : '';
  var trat  = document.getElementById('p-trat') ? document.getElementById('p-trat').value : 'Sr.';
  var tipo  = document.getElementById('p-tipo') ? document.getElementById('p-tipo').value.trim() : '';
  var link  = document.getElementById('p-link') ? document.getElementById('p-link').value.trim() : '';
  var nc    = nomeCompleto(nome, trat);
  var art   = trat==='Da' ? 'a' : 'o';
  var dart  = trat==='Da' ? 'da' : 'do';
  var d     = {NOME:nc, TIPO:tipo||'[tipo]', LINK:link||'[link]', ART:art, DART:dart};
  var b1=getBVal('bp-1'), b2=getBVal('bp-2'), b3=getBVal('bp-3'), b4=getBVal('bp-4');
  var prev=document.getElementById('p-prev'); if(!prev) return;
  if([b1,b2,b3,b4].every(function(v){ return v===undefined; })){
    prev.innerHTML='<span class="ph">Selecciona os blocos para construir a mensagem.</span>'; return;
  }
  var sep = _pCanal==='email' ? '\n\n' : '\n';
  var pp  = [b1,b2,b3,b4].filter(function(v){ return v; }).map(function(v){ return fillD(v,d); });
  prev.innerText = pp.join(sep);
  memSave('proposta', P_MEM, ['bp-1','bp-2','bp-3','bp-4']);
}

function pCopiarAssunto(){
  var nome = document.getElementById('p-nome') ? document.getElementById('p-nome').value.trim() : '[nome]';
  var trat = document.getElementById('p-trat') ? document.getElementById('p-trat').value : 'Sr.';
  var tipo = document.getElementById('p-tipo') ? document.getElementById('p-tipo').value.trim() : '[tipo]';
  var nc   = nomeCompleto(nome, trat);
  navigator.clipboard.writeText('Proposta ' + tipo + ' — ' + nc).then(function(){ toast('Assunto copiado!'); });
}

function pCopiar(){
  var txt=document.getElementById('p-prev') ? document.getElementById('p-prev').innerText : '';
  if(!txt || txt.includes('Selecciona')) return;
  navigator.clipboard.writeText(txt).then(function(){ toast('✓ Mensagem copiada!'); });
}

function pGuardar(){
  var txt=document.getElementById('p-prev') ? document.getElementById('p-prev').innerText : '';
  if(!txt || txt.includes('Selecciona')){ toast('Nada para guardar'); return; }
  var nome=document.getElementById('p-nome') ? document.getElementById('p-nome').value.trim() : '';
  guardarRascunho('Proposta'+(nome?' — '+nome:''), txt, 'proposta');
}

function pReset(){
  ['p-nome','p-link','p-tipo'].forEach(function(id){ var e=document.getElementById(id); if(e) e.value=''; });
  var pt=document.getElementById('p-trat'); if(pt) pt.value='Sr.';
  resetBlocos(['bp-1','bp-2','bp-3','bp-4']);
  var prev=document.getElementById('p-prev');
  if(prev) prev.innerHTML='<span class="ph">Selecciona os blocos para construir a mensagem.</span>';
  memClear('proposta');
}

}

function rRefCard(tipo){
  var val=document.getElementById('r-'+tipo) ? document.getElementById('r-'+tipo).value.trim() : '';
  var rc=document.getElementById('rc-'+tipo); if(rc) rc.classList.toggle('tem',!!val);
}

function rGetRefs(){
  var pc=document.getElementById('r-pc') ? document.getElementById('r-pc').value.trim() : '';
  var os=document.getElementById('r-os') ? document.getElementById('r-os').value.trim() : '';
  var p=[]; if(pc) p.push('PC '+pc); if(os) p.push('OS '+os);
  return {str: p.length ? ' ('+p.join(' · ')+')' : '', arr:p};
}

function rAddArt(){
  var id=++_rAid;
  var lista=document.getElementById('r-arts'); if(!lista) return;
  var d=document.createElement('div');
  d.className='art-linha'; d.id='art-'+id;
  d.innerHTML='<input class="inp" style="padding:7px 10px;font-size:12px" placeholder="Descrição do artigo" oninput="rRender()">' +
    '<input class="inp" style="padding:7px 10px;font-size:12px" placeholder="Referência" oninput="rRender()">' +
    '<button class="btn-del" onclick="document.getElementById(\'art-'+id+'\').remove();rRender()">×</button>';
  lista.appendChild(d);
}

function rRenderDests(){
  var ctcs=getCtcs();
  var el=document.getElementById('r-dest-lista'); if(!el) return;
  if(!ctcs.length){ el.innerHTML='<p style="font-size:12px;color:var(--ink-4);font-style:italic">Sem contactos. Clica em "Gerir contactos".</p>'; return; }
  el.innerHTML=ctcs.map(function(c){
    return '<div class="dest-item" id="di-'+c.id+'">' +
      '<div class="dest-check" id="dc-'+c.id+'"></div>' +
      '<div class="dest-info"><div class="dest-nome">'+c.nome+'</div><div class="dest-email">'+c.email+'</div></div>' +
      '<div class="dest-btns">' +
      '<button class="dest-btn" id="dp-'+c.id+'" onclick="rSelDest('+c.id+',\'para\')">Para</button>' +
      '<button class="dest-btn" id="dcc-'+c.id+'" onclick="rSelDest('+c.id+',\'cc\')">CC</button>' +
      '</div></div>';
  }).join('');
}

function rSelDest(id,tipo){
  var item=document.getElementById('di-'+id);
  var check=document.getElementById('dc-'+id);
  var bp=document.getElementById('dp-'+id);
  var bc=document.getElementById('dcc-'+id);
  if(!item) return;
  var jaEste=item.classList.contains(tipo==='para'?'sp':'sc');
  item.classList.remove('sp','sc');
  if(check) check.textContent='';
  if(bp) bp.classList.remove('ap');
  if(bc) bc.classList.remove('ac');
  if(!jaEste){
    item.classList.add(tipo==='para'?'sp':'sc');
    if(check) check.textContent='✓';
    if(tipo==='para' && bp) bp.classList.add('ap');
    else if(bc) bc.classList.add('ac');
  }
}

function rCopiarDest(tipo){
  var ctcs=getCtcs();
  var cls=tipo==='para'?'sp':'sc';
  var emails=ctcs.filter(function(c){ return document.getElementById('di-'+c.id) && document.getElementById('di-'+c.id).classList.contains(cls); }).map(function(c){ return c.email; });
  if(!emails.length){ toast('Nenhum seleccionado'); return; }
  navigator.clipboard.writeText(emails.join('; ')).then(function(){ toast('Emails copiados!'); });
}

function rRender(){
  var nome=document.getElementById('r-nome') ? document.getElementById('r-nome').value.trim() : '';
  var trat=document.getElementById('r-trat') ? document.getElementById('r-trat').value : 'Sr.';
  var desc=document.getElementById('r-desc') ? document.getElementById('r-desc').value.trim() : '';
  var refs=rGetRefs();
  var nc  =nomeCompleto(nome,trat);
  var art =trat==='Da'?'a':'o';
  var dart=trat==='Da'?'da':'do';
  var d={NOME:nc, REFS:refs.str, ART:art, DART:dart};
  var b1=getBVal('rb-1'),b2=getBVal('rb-2'),b3=getBVal('rb-3'),b4=getBVal('rb-4');
  var arts=[];
  document.querySelectorAll('.art-linha').forEach(function(l){
    var d2=l.querySelectorAll('input')[0] ? l.querySelectorAll('input')[0].value.trim() : '';
    var r =l.querySelectorAll('input')[1] ? l.querySelectorAll('input')[1].value.trim() : '';
    if(d2||r) arts.push({desc:d2||'[descrição]',ref:r||'[ref]'});
  });
  var prev=document.getElementById('r-prev'); if(!prev) return;
  var temAlgo=[b1,b2,b3,b4].some(function(v){ return v!==undefined; })||desc||arts.length||refs.arr.length;
  if(!temAlgo){ prev.innerHTML='<span class="ph">Preenche os dados e selecciona os blocos.</span>'; return; }
  _rAssunto='Situação em obra — '+(nome||'[nome]')+(refs.arr.length?' · '+refs.arr.join(' · '):'');
  var pp=[];
  if(b1) pp.push(fillD(b1,d));
  if(b2) pp.push(fillD(b2,d));
  if(desc) pp.push(desc);
  if(arts.length) pp.push('Artigos envolvidos:\n'+arts.map(function(a){ return '— '+a.desc+' · Ref: '+a.ref; }).join('\n'));
  if(b3) pp.push(fillD(b3,d));
  if(b4) pp.push(fillD(b4,d));
  var aHTML='<div style="margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--paper-3)">' +
    '<div style="font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink-4);margin-bottom:3px">Assunto</div>' +
    '<div style="font-size:13px;font-weight:500;color:var(--ink)">'+_rAssunto+'</div></div>';
  prev.innerHTML=aHTML+'<span style="white-space:pre-wrap">'+pp.filter(Boolean).join('\n\n')+'</span>';
  memSave('reporte', R_MEM, ['rb-1','rb-2','rb-3','rb-4']);
}

function rCopiarAssunto(){ if(!_rAssunto) return; navigator.clipboard.writeText(_rAssunto).then(function(){ toast('Assunto copiado!'); }); }

function rCopiar(){
  var txt='';
  var prev=document.getElementById('r-prev');
  if(prev){ var span=prev.querySelector('span[style]'); txt=span?span.innerText:prev.innerText; }
  if(!txt){ toast('Nada para copiar'); return; }
  navigator.clipboard.writeText(_rAssunto+'\n\n'+txt).then(function(){ toast('✓ Mensagem copiada!'); });
}

function rGuardar(){
  var prev=document.getElementById('r-prev');
  if(!prev){ toast('Nada para guardar'); return; }
  guardarRascunho('Reporte'+(document.getElementById('r-nome')?(' — '+document.getElementById('r-nome').value.trim()):''), prev.innerText, 'reporte');
}

function rReset(){
  ['r-nome','r-pc','r-os','r-desc'].forEach(function(id){ var e=document.getElementById(id); if(e) e.value=''; });
  var rt=document.getElementById('r-trat'); if(rt) rt.value='Sr.';
  ['rc-pc','rc-os'].forEach(function(id){ var e=document.getElementById(id); if(e) e.classList.remove('tem'); });
  var arts=document.getElementById('r-arts'); if(arts) arts.innerHTML='';
  _rAid=0; _rAssunto='';
  resetBlocos(['rb-1','rb-2','rb-3','rb-4']);
  rAddArt(); rRenderDests();
  var prev=document.getElementById('r-prev');
  if(prev) prev.innerHTML='<span class="ph">Preenche os dados e selecciona os blocos.</span>';
  memClear('reporte');
}

function prMudar(d){
  _prDest=d;

function prRender(){
  var prev=document.getElementById('pr-prev'); if(!prev) return;
  var pp=[];
  if(_prDest==='int'){
    var pc=document.getElementById('i-pc') ? document.getElementById('i-pc').value.trim() : '';
    var os=document.getElementById('i-os') ? document.getElementById('i-os').value.trim() : '';
    var corpo=document.getElementById('i-corpo') ? document.getElementById('i-corpo').value.trim() : '';
    var extra=document.getElementById('i-extra') ? document.getElementById('i-extra').value.trim() : '';
    var rp=[]; if(pc) rp.push('PC '+pc); if(os) rp.push('OS '+os);
    var refs=rp.join(' · ');
    var d={REF:refs||'[PC/OS]'};
    var b1=getBVal('bi-1'),b2=getBVal('bi-2'),b3=getBVal('bi-3'),b4=getBVal('bi-4'),b5=getBVal('bi-5'),b6=getBVal('bi-6'),b7=getBVal('bi-7');
    var temAlgo=[b1,b2,b3,b4,b5,b6,b7].some(function(v){ return v!==undefined; })||corpo||refs;
    if(!temAlgo){ prev.innerHTML='<span class="ph">Selecciona os blocos para construir a mensagem.</span>'; return; }
    if(b1) pp.push(b1);
    if(b2) pp.push(b2);
    if(b3){ pp.push(fillD(b3,d)); if(refs && b3.indexOf('{{REF}}')===-1) pp.push(refs); }
    else if(refs) pp.push(refs);
    if(corpo) pp.push(corpo);
    if(extra) pp.push(extra);
    if(b4) pp.push(fillD(b4,d));
    if(b5) pp.push(b5);
    if(b6) pp.push(b6);
    if(b7) pp.push(b7);
  } else {
    var nome=document.getElementById('c-nome') ? document.getElementById('c-nome').value.trim() : '';
    var trat=document.getElementById('c-trat') ? document.getElementById('c-trat').value : 'Sr.';
    var corpo2=document.getElementById('c-corpo') ? document.getElementById('c-corpo').value.trim() : '';
    var extra2=document.getElementById('c-extra') ? document.getElementById('c-extra').value.trim() : '';
    var nc=nomeCompleto(nome,trat);
    var art=trat==='Da'?'a':'o';
    var d2={NOME:nc, ART:art};
    var c1=getBVal('bc-1'),c2=getBVal('bc-2'),c3=getBVal('bc-3'),c4=getBVal('bc-4'),c5=getBVal('bc-5'),c6=getBVal('bc-6'),c7=getBVal('bc-7');
    var temAlgo2=[c1,c2,c3,c4,c5,c6,c7].some(function(v){ return v!==undefined; })||corpo2;
    if(!temAlgo2){ prev.innerHTML='<span class="ph">Selecciona os blocos para construir a mensagem.</span>'; return; }
    if(c1) pp.push(fillD(c1,d2));
    if(c2) pp.push(c2);
    if(c3) pp.push(c3);
    if(corpo2) pp.push(corpo2);
    if(extra2) pp.push(extra2);
    if(c4) pp.push(c4);
    if(c5) pp.push(c5);
    if(c6) pp.push(c6);
    if(c7) pp.push(c7);
  }
  prev.innerText=pp.filter(Boolean).join('\n\n');
  memSave('processuais', PR_MEM, ['bi-1','bi-2','bi-3','bi-4','bi-5','bi-6','bi-7','bc-1','bc-2','bc-3','bc-4','bc-5','bc-6','bc-7']);
}

function prCopiar(){
  var txt=document.getElementById('pr-prev') ? document.getElementById('pr-prev').innerText : '';
  if(!txt||txt.includes('Selecciona')){ toast('Nada para copiar'); return; }
  navigator.clipboard.writeText(txt).then(function(){ toast('✓ Mensagem copiada!'); });
}

function prGuardar(){
  var txt=document.getElementById('pr-prev') ? document.getElementById('pr-prev').innerText : '';
  if(!txt||txt.includes('Selecciona')){ toast('Nada para guardar'); return; }
  guardarRascunho('Mensagem processual', txt, 'processuais');
}

function prReset(){
  ['i-pc','i-os','i-corpo','i-extra','c-nome','c-corpo','c-extra'].forEach(function(id){ var e=document.getElementById(id); if(e) e.value=''; });
  var ct=document.getElementById('c-trat'); if(ct) ct.value='Sr.';
  ['irc-pc','irc-os'].forEach(function(id){ var e=document.getElementById(id); if(e) e.classList.remove('tem'); });
  resetBlocos(['bi-1','bi-2','bi-3','bi-4','bi-5','bi-6','bi-7','bc-1','bc-2','bc-3','bc-4','bc-5','bc-6','bc-7']);
  var prev=document.getElementById('pr-prev');
  if(prev) prev.innerHTML='<span class="ph">Selecciona os blocos para construir a mensagem.</span>';
  memClear('processuais');
}

function rrInit(){
  document.getElementById('content').addEventListener('click', function(e){
    var el=e.target.closest('.rr-msg');
    if(el) rrCopiar(el);
  });
}

function rrToggle(id){
  var bloco=document.getElementById('rr-'+id);
  if(bloco) bloco.classList.toggle('aberto');
}

function rrCopiar(el){
  var texto=el.dataset.msg||'';
  navigator.clipboard.writeText(texto).then(function(){
    var span=el.querySelector('span:last-child');
    var orig=span.textContent;
    span.textContent='✓ copiado';
    span.style.color='var(--green)';
    el.style.borderColor='var(--green-brd)';
    el.style.background='var(--green-pale)';
    setTimeout(function(){
      span.textContent=orig; span.style.color='';
      el.style.borderColor=''; el.style.background='';
    },2000);
  });
}

var BLOCO_CAT={
  'bp-1':'abertura','bp-2':'abertura','bp-3':'acompanhamento','bp-4':'pessoal',
  'rb-1':'abertura','rb-2':'problemas','rb-3':'acompanhamento','rb-4':'encerramento',
  'bi-1':'abertura','bi-2':'desculpas','bi-3':'abertura','bi-4':'confirmacao','bi-5':'acompanhamento','bi-6':'disponibilidade','bi-7':'encerramento',
  'bc-1':'abertura','bc-2':'desculpas','bc-3':'abertura','bc-4':'acompanhamento','bc-5':'disponibilidade','bc-6':'agradecimento','bc-7':'pessoal'
};

function pgBiblioteca(){
  var total=BIBLIOTECA.reduce(function(a,c){ return a+c.secs.reduce(function(b,s){ return b+s.frases.length; },0); },0);
  return '<div class="page-eyebrow">Referência</div>' +
    '<div class="page-title">📚 Biblioteca de <em>Frases</em></div>' +
    '<div class="page-sub">'+total+' frases organizadas por tema.</div>' +
    '<div class="bib-bar"><div class="bib-sw"><span class="bib-si">🔍</span>' +
    '<input class="bib-inp" id="bib-search" placeholder="Pesquisar frases..." oninput="bibFiltrar()"></div>' +
    '<div class="bib-count" id="bib-count">'+total+' frases</div></div>' +
    '<div class="bib-cats" id="bib-cats"></div>' +
    '<div id="bib-main"></div>';
}

function bibInit(){ _bibCat=null; _bibQ=''; bibRenderCats(); bibRenderMain(); }

function bibFiltrar(){ _bibQ=document.getElementById('bib-search')?document.getElementById('bib-search').value:''; _bibCat=null; bibRenderCats(); bibRenderMain(); }

function bibSelCat(id){ _bibCat=_bibCat===id?null:id; _bibQ=''; var el=document.getElementById('bib-search'); if(el) el.value=''; bibRenderCats(); bibRenderMain(); }

function bibRenderCats(){
  var el=document.getElementById('bib-cats'); if(!el) return;
  el.innerHTML='<div class="bib-cat '+(!_bibCat?'at':'')+'" onclick="bibSelCat(null)">Todas</div>' +
    BIBLIOTECA.map(function(c){ return '<div class="bib-cat '+(_bibCat===c.id?'at':'')+'" onclick="bibSelCat(\''+c.id+'\')">'+c.ico+' '+c.titulo+'</div>'; }).join('');
}

function bibRenderMain(){
  var el=document.getElementById('bib-main'); if(!el) return;
  var cats=_bibCat?BIBLIOTECA.filter(function(c){ return c.id===_bibCat; }):BIBLIOTECA;
  var ql=_bibQ.toLowerCase().trim();
  var html=''; var total=0;
  cats.forEach(function(cat){
    var catHtml='';
    cat.secs.forEach(function(sec){
      var fr=ql?sec.frases.filter(function(f){ return f.toLowerCase().indexOf(ql)>=0; }):sec.frases;
      if(!fr.length) return;
      total+=fr.length;
      catHtml+='<div class="bib-st">'+sec.titulo+'</div><div class="bib-fs">' +
        fr.map(function(f){
          var fav=isFav(f);
          return '<div class="bib-f"><div class="bib-ft">'+f+'</div>' +
            '<div class="bib-fa">' +
            '<button class="btn-cb" onclick="bibCopiar(\''+esc(f)+'\')">Copiar</button>' +
            '<button class="btn-fb'+(fav?' at':'')+'" onclick="bibTogFav(\''+esc(f)+'\',\''+cat.titulo+'\')">⭐</button>' +
            '</div></div>';
        }).join('') + '</div>';
    });
    if(!catHtml) return;
    html+='<div style="margin-bottom:28px">' +
      '<div style="font-family:var(--serif);font-size:20px;font-weight:300;margin-bottom:2px">'+cat.ico+' '+cat.titulo+'</div>' +
      '<div style="font-size:12px;color:var(--ink-3);margin-bottom:12px">'+cat.sub+'</div>' +
      catHtml+'</div>';
  });
  el.innerHTML=html||'<div class="empty"><div class="empty-ico">🔍</div><div class="empty-t">Nenhuma frase encontrada</div></div>';
  var c=document.getElementById('bib-count'); if(c) c.textContent=total+' frases';
}

function bibCopiar(t){ navigator.clipboard.writeText(t.replace(/\\n/g,'\n')).then(function(){ toast('Copiado!'); }); }
function bibTogFav(t,cat){ var texto=t.replace(/\\n/g,'\n'); var ficou=toggleFav(texto,cat); toast(ficou?'⭐ Guardado nos favoritos':'Removido dos favoritos'); bibRenderMain(); }

function pgFavoritos(){
  var favs=getFavs();
  if(!favs.length) return '<div class="page-eyebrow">Guardado</div><div class="page-title">⭐ <em>Favoritos</em></div>' +
    '<div class="empty"><div class="empty-ico">⭐</div><div class="empty-t">Sem favoritos ainda</div><div class="empty-s">Clica em ⭐ em qualquer frase da biblioteca.</div></div>';
  return '<div class="page-eyebrow">Guardado</div><div class="page-title">⭐ <em>Favoritos</em></div>' +
    '<div class="page-sub">'+favs.length+' frase(s) guardada(s)</div>' +
    '<div class="fav-grid">' +
    favs.map(function(f){
      return '<div class="fav-card"><div class="fav-body">' +
        '<div class="fav-cat">'+f.categoria+' · '+f.data+'</div>' +
        '<div class="fav-txt">'+f.texto+'</div></div>' +
        '<div style="display:flex;flex-direction:column;gap:5px">' +
        '<button class="btn-ic" onclick="navigator.clipboard.writeText(\''+esc(f.texto)+'\').then(function(){ toast(\'Copiado!\'); })">📋</button>' +
        '<button class="btn-ic" onclick="remFav('+f.id+')">🗑</button>' +
        '</div></div>';
    }).join('') + '</div>';
}

function remFav(id){ removeFav(id); navegar('favoritos'); toast('Removido dos favoritos'); }

function pgRascunhos(){

  return '<div class="page-eyebrow">Guardado</div><div class="page-title">📝 <em>Rascunhos</em></div>' +
    '<div class="page-sub">'+rascs.length+' rascunho(s)</div>' +
    rascs.map(function(r){
      return '<div class="rasc-card">' +
        '<div class="rasc-hdr"><div class="rasc-titulo">'+r.titulo+'</div><div class="rasc-data">'+r.data+' '+r.hora+'</div></div>' +
        '<div class="rasc-txt">'+r.texto+'</div>' +
        '<div class="rasc-acoes">' +

        '<button class="btn-r del" onclick="remRasc('+r.id+')">🗑 Remover</button>' +

function remRasc(id){ removeRasc(id); navegar('rascunhos'); toast('Rascunho removido'); }

// MODAL BIBLIOTECA
// ═══════════════════════════════════════════════════════

var _mbBlocoId=null, _mbFiltCat=null;

function modalBibAbrir(blocoId){
  _mbBlocoId=blocoId;
  var catId=BLOCO_CAT[blocoId]||null;
  _mbFiltCat=catId;
  var cat=catId?BIBLIOTECA.find(function(c){ return c.id===catId; }):null;
  var hint=document.getElementById('modal-hint');
  if(hint) hint.textContent=cat?'Sugestão: '+cat.titulo:'Pesquisa em toda a biblioteca';
  var si=document.getElementById('modal-search'); if(si) si.value='';
  modalBibRenderCats();
  modalBibRenderLista('');
  document.getElementById('modal-bib').classList.add('aberto');
  setTimeout(function(){ var el=document.getElementById('modal-search'); if(el) el.focus(); },80);
}

function modalBibFechar(){ document.getElementById('modal-bib').classList.remove('aberto'); }

function modalBibSelCat(id){
  _mbFiltCat=id;
  var si=document.getElementById('modal-search'); if(si) si.value='';
  modalBibRenderCats();
  modalBibRenderLista('');
}

function modalBibFiltrar(){
  var q=document.getElementById('modal-search')?document.getElementById('modal-search').value:'';
  modalBibRenderLista(q);
}

function modalBibRenderCats(){
  var el=document.getElementById('modal-cats'); if(!el) return;
  el.innerHTML='<div class="modal-cat-pill '+(!_mbFiltCat?'at':'')+'" onclick="modalBibSelCat(null)">Todas</div>' +
    BIBLIOTECA.map(function(c){
      return '<div class="modal-cat-pill '+(_mbFiltCat===c.id?'at':'')+'" onclick="modalBibSelCat(\''+c.id+'\')">'+c.ico+' '+c.titulo+'</div>';
    }).join('');
}

function modalBibRenderLista(q){
  var el=document.getElementById('modal-lista'); if(!el) return;
  var ql=q.toLowerCase().trim();
  var cats=_mbFiltCat?BIBLIOTECA.filter(function(c){ return c.id===_mbFiltCat; }):BIBLIOTECA;
  var html='';
  cats.forEach(function(cat){
    var todas=cat.secs.reduce(function(a,s){ return a.concat(s.frases); },[]);
    var fr=ql?todas.filter(function(f){ return f.toLowerCase().indexOf(ql)>=0; }):todas;
    if(!fr.length) return;
    if(!_mbFiltCat) html+='<div class="modal-ch">'+cat.ico+' '+cat.titulo+'</div>';
    fr.forEach(function(f){
      html+='<div class="modal-frase" onclick="modalBibInserir(\''+esc(f)+'\')">'+f+'</div>';
    });
  });
  el.innerHTML=html||'<div style="text-align:center;padding:28px;color:var(--ink-4);font-size:13px">Nenhuma frase encontrada'+(ql?' para "'+q+'"':'')+'.</div>';
}

function modalBibInserir(frase){
  if(!_mbBlocoId) return;
  var texto=frase.replace(/\\n/g,'\n');
  var inp=document.getElementById('l-'+_mbBlocoId);
  if(inp){
    inp.value=texto;
    var bloco=document.getElementById(_mbBlocoId);
    var s=document.getElementById('s-'+_mbBlocoId);
    var opts=document.getElementById('o-'+_mbBlocoId);
    if(opts) opts.querySelectorAll('.opc').forEach(function(o){ o.classList.remove('av','aa'); });
    if(bloco) bloco.classList.add('sv');
    if(s) s.textContent=texto.slice(0,28);
    triggerRender();
  }
  modalBibFechar();
  toast('Frase inserida ✓');
}

function modalCtcAbrir(){ ctcRenderLista(); document.getElementById('modal-ctc').classList.add('aberto'); }
function modalCtcFechar(){ document.getElementById('modal-ctc').classList.remove('aberto'); }

function ctcRenderLista(){
  var ctcs=getCtcs();
  var el=document.getElementById('ctc-lista'); if(!el) return;
  if(!ctcs.length){ el.innerHTML='<p style="font-size:13px;color:var(--ink-4);font-style:italic">Nenhum contacto guardado ainda.</p>'; return; }
  el.innerHTML=ctcs.map(function(c){
    return '<div class="ctc-item">' +
      '<div class="ctc-info"><div class="ctc-nome">'+c.nome+'</div><div class="ctc-email">'+c.email+'</div></div>' +
      '<button class="btn-dc" onclick="ctcRemover('+c.id+')">×</button></div>';
  }).join('');
}

function ctcAdicionar(){
  var nome=document.getElementById('ctc-nome')?document.getElementById('ctc-nome').value.trim():'';
  var email=document.getElementById('ctc-email')?document.getElementById('ctc-email').value.trim():'';
  if(!nome||!email) return;
  var ctcs=getCtcs();
  ctcs.push({id:Date.now(),nome:nome,email:email});
  saveCtcs(ctcs);
  var n=document.getElementById('ctc-nome'); if(n) n.value='';
  var e=document.getElementById('ctc-email'); if(e) e.value='';
  ctcRenderLista();
  document.dispatchEvent(new CustomEvent('ctcActualizado'));
}

function ctcRemover(id){
  saveCtcs(getCtcs().filter(function(c){ return c.id!==id; }));
  ctcRenderLista();
  document.dispatchEvent(new CustomEvent('ctcActualizado'));
}
